<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata — G&amp;G Technologies</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#1f1e1d">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #1f1e1d;
      --text: #f0eee7;
      --muted: #b3b0a7;
      --accent: #d97757;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #faf9f5;
        --text: #1f1e1d;
        --muted: #5e5d59;
        --accent: #c15f3c;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-family: ui-serif, Georgia, 'Times New Roman', Times, serif;
      font-size: 6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    h1 {
      font-family: ui-serif, Georgia, 'Times New Roman', Times, serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin: 18px 0 8px;
    }
    p { color: var(--muted); margin-bottom: 28px; }
    a {
      display: inline-block;
      padding: 13px 28px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Pagina non trovata · Page not found</h1>
    <p>La pagina che cerchi non esiste o è stata spostata.<br>The page you are looking for does not exist or has moved.</p>
    <a href="/">Torna alla home · Back home</a>
  </div>
</body>
</html>
