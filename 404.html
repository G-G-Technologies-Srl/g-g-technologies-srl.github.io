<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata — G&amp;G Technologies</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#06080f">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #06080f;
      color: #e9edf5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }
    .code {
      font-size: 6rem;
      font-weight: 800;
      background: linear-gradient(100deg, #4f8cff, #7c5cff 55%, #2dd4bf);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
    }
    h1 { font-size: 1.4rem; margin: 18px 0 8px; }
    p { color: #9aa4b8; margin-bottom: 28px; }
    a {
      display: inline-block;
      padding: 13px 28px;
      border-radius: 999px;
      background: linear-gradient(100deg, #4f8cff, #7c5cff 55%, #2dd4bf);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Pagina non trovata · Page not found</h1>
    <p>La pagina che cerchi non esiste o è stata spostata.<br>The page you are looking for does not exist or has moved.</p>
    <a href="/">Torna alla home · Back home</a>
  </div>
</body>
</html>
